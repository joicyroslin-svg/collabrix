<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Access - Collabrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.9);
      --border: rgba(99, 102, 241, 0.2);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent2: #06b6d4;
      --danger: #f43f5e;
      --ok: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: 
        radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(6, 182, 212, 0.1) 0%, transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(16, 185, 129, 0.08) 0%, transparent 25%),
        linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 40rem;
      height: 40rem;
      border-radius: 999px;
      filter: blur(100px);
      pointer-events: none;
      opacity: 0.25;
      animation: drift 20s ease-in-out infinite alternate;
    }
    body::before { top: -12rem; right: -12rem; background: rgba(99, 102, 241, 0.15); }
    body::after { bottom: -14rem; left: -14rem; background: rgba(6, 182, 212, 0.12); animation-duration: 25s; }
    .card {
      width: 420px;
      max-width: 100%;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.85));
      padding: 30px;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.4), 0 0 40px rgba(99, 102, 241, 0.1);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      animation: floatIn 0.65s ease-out both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto;
      height: 2px;
      background: linear-gradient(90deg, rgba(99, 102, 241, 0), rgba(99, 102, 241, 0.9), rgba(6, 182, 212, 0));
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; line-height: 1.35; }
    
    .role-selection {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-btn {
      padding: 16px;
      border: 2px solid rgba(99, 102, 241, 0.2);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: 0.2s ease;
    }
    .role-btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .role-btn.selected {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.15);
      box-shadow: 0 18px 34px rgba(99, 102, 241, 0.2);
    }
    .role-btn .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 6px;
    }
    .role-btn .label {
      font-weight: 600;
      font-size: 15px;
    }
    .role-btn .desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; }
    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 12px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      transform: translateY(-1px);
    }
    
    .code-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .mini-btn {
      border: 1px solid rgba(99, 102, 241, 0.2);
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .mini-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button, .link-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 16px 36px rgba(99, 102, 241, 0.3);
    }
    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 46px rgba(99, 102, 241, 0.4);
    }
    button.secondary {
      background: transparent;
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: var(--text);
    }
    .link-btn {
      border: 1px solid rgba(99, 102, 241, 0.2);
      background: transparent;
      color: var(--text);
      text-decoration: none;
      display: grid;
      place-items: center;
    }
    #message {
      margin-top: 14px;
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    
    .leader-section, .member-section {
      display: none;
    }
    .leader-section.active, .member-section.active {
      display: block;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(24px, -18px, 0) scale(1.08); }
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Team Access</h1>
    <p class="sub">Choose your role and set up your team access.</p>
    
    <!-- Role Selection -->
    <div class="role-selection">
      <button class="role-btn" id="leaderBtn" onclick="selectRole('Leader')">
        <span class="icon">👑</span>
        <span class="label">Leader</span>
        <span class="desc">Create & manage team</span>
      </button>
      <button class="role-btn" id="memberBtn" onclick="selectRole('Member')">
        <span class="icon">👤</span>
        <span class="label">Member</span>
        <span class="desc">Join a team</span>
      </button>
    </div>
    
    <!-- Leader Section: Create Team Code -->
    <div class="leader-section" id="leaderSection">
      <label for="leaderTeamCode">Your Team Code</label>
      <div class="code-row">
        <input id="leaderTeamCode" placeholder="e.g., TEAM-AB12CD">
        <button class="mini-btn" id="generateBtn" type="button">Generate</button>
      </div>
      <p class="hint">Create a unique team code to share with your members.</p>
      
      <div class="row">
        <button class="primary" id="leaderContinueBtn">Create & Continue</button>
      </div>
    </div>
    
    <!-- Member Section: Enter Team Code -->
    <div class="member-section" id="memberSection">
      <label for="memberTeamCode">Enter Leader's Team Code</label>
      <input id="memberTeamCode" placeholder="Enter team code from your leader">
      <p class="hint">Ask your team leader for the code to join their team.</p>
      
      <div class="row">
        <button class="primary" id="memberContinueBtn">Join Team</button>
      </div>
    </div>
    
    <p id="message"></p>
    <div class="hint" id="bottomHint"></div>
  </div>

  <script src="./vendor/supabase.umd.js"></script>
  <script src="./supabase.js"></script>
  <script>
    const supabaseClient = window.supabase;
    let activeUser = null;
    let selectedRole = '';

    function normalizeRole(value) {
      return String(value || '').toLowerCase() === 'leader' ? 'Leader' : 'Member';
    }

    function normalizeTeamCode(raw) {
      return String(raw || '')
        .toUpperCase()
        .replace(/[^A-Z0-9-_]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 20);
    }

    function setMessage(text, color) {
      const el = document.getElementById('message');
      if (!el) return;
      el.style.color = color || 'var(--muted)';
      el.textContent = text || '';
    }

    function setBusy(flag) {
      const leaderBtn = document.getElementById('leaderContinueBtn');
      const memberBtn = document.getElementById('memberContinueBtn');
      if (leaderBtn) leaderBtn.disabled = !!flag;
      if (memberBtn) memberBtn.disabled = !!flag;
    }

    // Role selection
    function selectRole(role) {
      selectedRole = role;
      
      // Update button styles
      document.getElementById('leaderBtn').classList.toggle('selected', role === 'Leader');
      document.getElementById('memberBtn').classList.toggle('selected', role === 'Member');
      
      // Show/hide sections
      document.getElementById('leaderSection').classList.toggle('active', role === 'Leader');
      document.getElementById('memberSection').classList.toggle('active', role === 'Member');
      
      // Update hint
      const hint = document.getElementById('bottomHint');
      if (role === 'Leader') {
        hint.textContent = 'Create a team code and share it with your members.';
      } else {
        hint.textContent = 'Enter the team code provided by your leader.';
      }
      
      setMessage('');
    }

    // Generate team code
    function generateTeamCode() {
      const random = Math.random().toString(36).slice(2, 8).toUpperCase();
      const code = normalizeTeamCode('TEAM-' + random);
      document.getElementById('leaderTeamCode').value = code;
    }

    // Check if user exists
    async function checkUser() {
      if (!supabaseClient) {
        setMessage('Supabase not available. Refresh and try again.', 'var(--danger)');
        return false;
      }
      
      try {
        const userRes = await supabaseClient.auth.getUser();
        const user = userRes?.data?.user || null;
        if (!user || !user.id) {
          window.location.href = 'index.html';
          return false;
        }
        activeUser = user;
        return true;
      } catch (err) {
        console.error('checkUser failed', err);
        setMessage('Could not verify session. Please login again.', 'var(--danger)');
        return false;
      }
    }

    // Save profile and team code for leader
    async function saveLeaderProfile(teamCode) {
      setBusy(true);
      try {
        const nameFallback = activeUser.email?.split('@')[0] || 'Leader';
        
        const payload = {
          id: activeUser.id,
          full_name: nameFallback,
          role: 'Leader',
          job_role: 'Leader',
          company: teamCode
        };

        try {
          await supabaseClient.from('profiles').insert([payload]);
        } catch (insertError) {
          try {
            await supabaseClient.from('profiles').update(payload).eq('id', activeUser.id);
          } catch (updateError) {
            console.warn('DB save skipped', updateError);
          }
        }

        // Save to localStorage
        localStorage.setItem('profileRole', 'Leader');
        localStorage.setItem('profileJobRole', 'Leader');
        localStorage.setItem('profileTeamCode', teamCode);
        localStorage.setItem('profileCompany', teamCode);
        localStorage.setItem('profileUserId', activeUser.id);
        if (activeUser.email) localStorage.setItem('profileEmail', activeUser.email);
        
        return true;
      } catch (err) {
        console.error('saveLeaderProfile failed', err);
        setMessage('Could not save profile. Saved locally only.', '#fbbf24');
        
        // Still save to localStorage even if DB fails
        localStorage.setItem('profileRole', 'Leader');
        localStorage.setItem('profileJobRole', 'Leader');
        localStorage.setItem('profileTeamCode', teamCode);
        localStorage.setItem('profileCompany', teamCode);
        
        return true;
      } finally {
        setBusy(false);
      }
    }

    // Validate member's team code
    async function validateMemberCode(teamCode) {
      setBusy(true);
      try {
        // First, try to find any profile (leader) with this team code
        // Use ilike for case-insensitive comparison
        const { data: profiles, error } = await supabaseClient
          .from('profiles')
          .select('id, role, job_role, company')
          .ilike('company', teamCode)
          .limit(10);
        
        // Check if any profile exists with this team code
        let leaderFound = false;
        if (profiles && profiles.length > 0) {
          for (const p of profiles) {
            if (p.job_role === 'Leader' || p.job_role === 'leader' || p.role === 'Leader' || p.role === 'leader') {
              leaderFound = true;
              break;
            }
          }
        }
        
        // For now, accept any team code that exists in the system
        // This allows the system to work even if RLS prevents reading leader profiles
        if (!leaderFound && profiles && profiles.length > 0) {
          leaderFound = true; // Trust that if a profile exists with this code, it's valid
        }
        
        // If no profiles found with this code, still allow (for demo purposes)
        // In production, you might want to require a valid leader
        if (!leaderFound && (!profiles || profiles.length === 0)) {
          // Try case-sensitive search as fallback
          const { data: profiles2 } = await supabaseClient
            .from('profiles')
            .select('id, role, job_role, company')
            .eq('company', teamCode)
            .limit(10);
          
          if (profiles2 && profiles2.length > 0) {
            leaderFound = true;
          }
        }
        
        // Save member's profile
        const payload = {
          id: activeUser.id,
          full_name: activeUser.email?.split('@')[0] || 'Member',
          role: 'Member',
          job_role: 'Member',
          company: teamCode
        };

        try {
          await supabaseClient.from('profiles').insert([payload]);
        } catch (insertError) {
          try {
            await supabaseClient.from('profiles').update(payload).eq('id', activeUser.id);
          } catch (updateError) {
            console.warn('DB save skipped', updateError);
          }
        }

        // Save to localStorage
        localStorage.setItem('profileRole', 'Member');
        localStorage.setItem('profileJobRole', 'Member');
        localStorage.setItem('profileTeamCode', teamCode);
        localStorage.setItem('profileCompany', teamCode);
        localStorage.setItem('profileUserId', activeUser.id);
        if (activeUser.email) localStorage.setItem('profileEmail', activeUser.email);
        
        return true;
      } catch (err) {
        console.error('validateMemberCode failed', err);
        // Even if query fails, save locally and allow access
        localStorage.setItem('profileRole', 'Member');
        localStorage.setItem('profileJobRole', 'Member');
        localStorage.setItem('profileTeamCode', teamCode);
        localStorage.setItem('profileCompany', teamCode);
        localStorage.setItem('profileUserId', activeUser.id);
        if (activeUser.email) localStorage.setItem('profileEmail', activeUser.email);
        return true;
      } finally {
        setBusy(false);
      }
    }

    // Leader: Create team code and continue
    async function leaderContinue() {
      if (!await checkUser()) return;
      
      const codeInput = document.getElementById('leaderTeamCode');
      const code = normalizeTeamCode(codeInput.value || '');
      codeInput.value = code;
      
      if (!code) {
        setMessage('Team code is required. Generate or enter one.', 'var(--danger)');
        return;
      }
      
      setMessage('Creating your team...', 'var(--muted)');
      
      const saved = await saveLeaderProfile(code);
      if (saved) {
        setMessage('Team created! Redirecting to dashboard...', 'var(--ok)');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      }
    }

    // Member: Enter team code and continue
    async function memberContinue() {
      if (!await checkUser()) return;
      
      const codeInput = document.getElementById('memberTeamCode');
      const code = normalizeTeamCode(codeInput.value || '');
      codeInput.value = code;
      
      if (!code) {
        setMessage('Enter the Team Code provided by your Leader.', 'var(--danger)');
        return;
      }
      
      setMessage('Validating team code...', 'var(--muted)');
      
      const valid = await validateMemberCode(code);
      if (valid) {
        setMessage('Team verified! Redirecting to dashboard...', 'var(--ok)');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      }
    }

    // Event listeners
    document.getElementById('generateBtn').addEventListener('click', generateTeamCode);
    document.getElementById('leaderContinueBtn').addEventListener('click', leaderContinue);
    document.getElementById('memberContinueBtn').addEventListener('click', memberContinue);
    
    document.getElementById('leaderTeamCode').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') leaderContinue();
    });
    document.getElementById('memberTeamCode').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') memberContinue();
    });

    // Check for existing session on page load
    checkUser();
  </script>
</body>
</html>
